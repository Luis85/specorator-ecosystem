name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Page URL (if applicable)
      placeholder: https://luis85.github.io/specorator-ecosystem/...

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, screenshots, console errors — anything helpful.
